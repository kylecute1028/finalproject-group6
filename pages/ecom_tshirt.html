<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecommerce Home Page</title>
  <script src="../javascript.js" defer></script>
</head>
<body style="
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 40px;
    background: linear-gradient(to right, #dbeafe, #f0f9ff);
  ">


  <h1 style="color: #1e3a8a; font-size: 42px;">
    AniStore Philippines
  </h1>
  <p style="
      max-width: 600px;
      margin: 30px auto;
      font-size: 18px;
      line-height: 1.6;
      color: #374151;
      background-color: rgba(255,255,255,0.7);
      padding: 20px;
      border-radius: 10px;
    ">
    AniStore Philippines is an online hub for weebs
  </p>
  <p style="
      max-width: 600px;
      margin: 30px auto;
      font-size: 18px;
      line-height: 1.6;
      color: #374151;
      background-color: rgba(255,255,255,0.7);
      padding: 20px;
      border-radius: 10px;
    ">
    T SHIRTS
  </p>


  <ul style="
      list-style: none;
      padding: 0;
      margin: 0 auto;
      font-size: 18px;
      color: #1f2937;
      background-color: rgba(255,255,255,0.7);
      display: inline-block;
      padding: 20px 40px;
      border-radius: 10px;
    ">
    <li style="margin: 10px 0;">Your Name  - Php 135</li>
    <img src="https://zula.sg/wp-content/uploads/2019/07/uniqlo-your-name-1.jpg"
    alt="Picture"
    style="
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #1e3a8a;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    "
  />
  <div style="margin-top: 20px; text-align: center;">
    <button type="button" class="add-to-cart" style="
        padding: 10px 20px;
        background-color: #1e3a8a;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    ">
      Add to Cart
    </button>
    <div style="margin-top: 20px; text-align: center;">
    <button type="button" class="buy-now" style="
        padding: 10px 20px;
        background-color: #1e3a8a;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    ">
      Buy Now
    </button>
  </div>

  <div style="margin-top: 20px; text-align: left;">
    <a href="../ecommerce.html"style="
      list-style: none;
      font-size: 22px;
      font-weight: bold;
      color: #1e3a8a;
      text-decoration: none;
    ">
    Return to Home Page
  </div>
</body>
</html>
