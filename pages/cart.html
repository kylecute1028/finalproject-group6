<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart</title>
<link rel="stylesheet" href="../css.style.css">
<script src="../javascript.js" defer></script>
</head>

<body>

<h1>Your Cart</h1>

<ul id="cart-items"></ul>

<div style="margin-top: 20px; text-align: left;">
    <a href="../ecommerce.html"style="
      list-style: none;
      font-size: 22px;
      font-weight: bold;
      color: #000000;
      text-decoration: none;
    ">
    Return to Home Page
  </div>

    <button type="button" id="checkout-btn" style="
        padding: 10px 20px;
        background-color: #1e3a8a;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    ">
      Proceed to Checkout
    </button>

    <button type="button" id="discard-cart" style="
        padding: 10px 20px;
        background-color: #1e3a8a;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    ">
      Discard Cart
    </button>

<script src="../javascript.js" defer></script>

</body>
</html>
